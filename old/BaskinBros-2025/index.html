function decodeLogLine(line, callback) {
  const output = [];
  const stepsPerChar = 8;
  let frame = 0;

  for (let i = 0; i < line.length; i++) {
    output.push({ final: line[i], current: "", step: 0 });
  }

  function update() {
    let finished = true;
    let rendered = "";

    for (let i = 0; i < output.length; i++) {
      const o = output[i];
      if (o.step < stepsPerChar) {
        o.current = chars[Math.floor(Math.random() * chars.length)];
        o.step++;
        finished = false;
      } else {
        o.current = o.final;
      }
      rendered += o.current;
    }

    consoleEl.textContent = rendered;

    if (!finished) {
      requestAnimationFrame(update);
    } else if (callback) {
      callback();
    }
  }

  requestAnimationFrame(update);
}

function showNextLog() {
  if (logIndex >= logs.length) return;

  decodeLogLine(logs[logIndex], () => {
    logIndex++;
    setTimeout(showNextLog, 3000);
  });
}

<script>
const timerElement = document.getElementById("graxus-timer");
const progressBar = document.getElementById("graxus-progress");

const totalLogTime = logs.length * 3000; // Each log = 3s
const startTimestamp = Date.now();

function updateGraxusTimer() {
  const elapsed = Date.now() - startTimestamp;
  const remaining = Math.max(0, totalLogTime - elapsed);
  const seconds = Math.floor(remaining / 1000);
  const minutes = Math.floor(seconds / 60);
  const secondsLeft = seconds % 60;

  // Update countdown text
  const padded = (n) => n.toString().padStart(2, "0");
  timerElement.textContent = `⏳ ${padded(minutes)}:${padded(secondsLeft)} remaining`;

  // Update progress bar
  const percent = Math.min(100, (elapsed / totalLogTime) * 100);
  progressBar.style.width = `${percent.toFixed(2)}%`;

  if (remaining > 0) {
    requestAnimationFrame(updateGraxusTimer);
  } else {
    timerElement.textContent = "💥 Logs complete.";
    progressBar.style.width = "100%";
  }
}

// Start the synced timer + bar
requestAnimationFrame(updateGraxusTimer);
</script>

    { value: 1, duration: 100 },
    { value: 0.3, duration: 80 },
    { value: 1, duration: 80 }
  ],
  delay: anime.stagger(40),
  duration: 1000
})
// 3. Swing
.add({
  targets: letters,
  rotateZ: () => anime.random(-8, 8),
  duration: 800,
  easing: 'easeInOutSine'
})
// 4. Burnout flicker
.add({
  targets: letters,
  opacity: () => anime.random(0.2, 1),
  duration: 600,
  delay: anime.stagger(40),
  easing: 'easeInOutQuad'
})
// 5. Fall to footer + fade
.add({
  targets: letters,
  translateY: footerY - titleContainer.getBoundingClientRect().top,
  opacity: 0,
  rotateZ: () => anime.random(-25, 25),
  duration: 1400,
  delay: anime.stagger(100),
  easing: 'easeInQuad'
});

glitchTimeline.play();

glitchTimeline.finished.then(() => {
  setTimeout(() => {
    glitchTimeline.reverse();
    glitchTimeline.play();

    glitchTimeline.finished.then(() => {
      letters.forEach(letter => {
        letter.classList.remove("glow");
        letter.style.opacity = "0";
        letter.style.transform = "translateY(0) rotateZ(0deg)";
      });

      anime({
        targets: letters,
        opacity: [0, 1],
        scale: [
          { value: 1.3, duration: 100 },
          { value: 1, duration: 200 }
        ],
        delay: anime.stagger(80, { start: 200, from: 'center', direction: 'random' }),
        easing: 'easeOutExpo',
        duration: 400,
        complete: () => {
          letters.forEach(letter => letter.classList.add("glow"));

          // FINAL subtle glow reduction lock-in
          anime({
            targets: letters,
            textShadow: [
              "0 0 5px #99cc33, 0 0 10px #99cc33, 0 0 15px #99cc33",
              "0 0 3px #99cc33, 0 0 6px #99cc33, 0 0 9px #99cc33"
            ],
            duration: 800,
            easing: "easeOutSine",
            complete: () => {
              // Subtle idle flicker every 3 seconds
              setInterval(() => {
                const letter = letters[Math.floor(Math.random() * letters.length)];
                anime({
                  targets: letter,
                  opacity: [
                    { value: 0.6, duration: 50 },
                    { value: 1, duration: 100 }
                  ],
                  easing: 'easeInOutSine'
                });
              }, 3000);
            }
          });
        }
      });
    });
  }, 1000);
});
</script>
<script>
// Independent matrix effect for the paragraph
window.addEventListener("DOMContentLoaded", () => {
  const finalText = "I make stuff, break stuff, and sometimes share stuff. Expect incomplete music ideas, random projects, bad coding, and whatever else.";
  const targetP = document.querySelector(".matrix-text");
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!?";
  let frame = 0;

  function decodeEffect() {
    let output = "";
    let complete = true;

    for (let i = 0; i < finalText.length; i++) {
      if (frame < i * 3 && finalText[i] !== " ") {
        complete = false;
        output += chars[Math.floor(Math.random() * chars.length)];
      } else {
        output += finalText[i];
      }
    }

    targetP.textContent = output;
    frame++;

    if (!complete) {
      requestAnimationFrame(decodeEffect);
    }
  }

  targetP.style.opacity = "1";
  requestAnimationFrame(decodeEffect);
});
</script>

<script>
function triggerCrumble() {
  const allElements = document.querySelectorAll('body > *:not(script):not(style)');

  allElements.forEach(el => {
    const rect = el.getBoundingClientRect();
    const centerX = window.innerWidth / 2;
    const offset = rect.left + rect.width / 2 - centerX;

    anime({
      targets: el,
      translateY: [0, window.innerHeight + 300],
      rotateZ: () => anime.random(-90, 90),
      translateX: offset * 0.3,
      opacity: [1, 0],
      duration: 2000,
      easing: 'easeInCubic',
      delay: anime.stagger(100, { from: 'center' })
    });
  });

  // Optional: screen flash
  const flash = document.createElement('div');
  flash.style.position = 'fixed';
  flash.style.top = 0;
  flash.style.left = 0;
  flash.style.width = '100%';
  flash.style.height = '100%';
  flash.style.backgroundColor = '#ffffff';
  flash.style.zIndex = 9999;
  flash.style.opacity = 0;
  document.body.appendChild(flash);

  anime({
    targets: flash,
    opacity: [0, 1, 0],
    duration: 400,
    easing: 'easeOutQuad',
    complete: () => flash.remove()
  });
}
