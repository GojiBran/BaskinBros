  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Press Start 2P', monospace;
      color: #99cc33;
      overflow-x: hidden;
      background-color: #202020;
      animation: crt-drift 8s infinite alternate ease-in-out;
    }

    /* CRT drift */
    @keyframes crt-drift {
      0% { transform: translateX(0); }
      50% { transform: translateX(2px); }
      100% { transform: translateX(-2px); }
    }

    /* Tiny CRT flicker shake */
    body.shake {
      animation: crt-shake 0.2s;
    }
    @keyframes crt-shake {
      0% { transform: translate(0px, 0px); }
      20% { transform: translate(1px, -1px); }
      40% { transform: translate(-1px, 1px); }
      60% { transform: translate(1px, 1px); }
      80% { transform: translate(-1px, -1px); }
      100% { transform: translate(0px, 0px); }
    }

    /* CRT flash effect */
    body.flash {
      background-color: #404040 !important;
      transition: background-color 0.1s ease;
    }

    .custom-title {
      color: #99cc33;
    }

    .card, .card-header, .card-title {
      background-color: #505050;
      color: #99cc33;
    }
    .card-header {
      background-color: #404040;
    }

    .navbar {
      background-color: #303030;
    }
    .navbar a {
      color: #99cc33 !important;
      transition: text-shadow 0.3s ease;
    }
    .navbar a:hover {
      text-shadow: 0 0 8px #99cc33;
    }

    .footer {
      background-color: #303030;
      color: #99cc33;
      padding: 1rem 0;
      position: fixed;
      width: 100%;
      bottom: 0;
      text-align: center;
      z-index: 10;
      font-family: monospace;
    }
    .footer a {
      color: #99cc33;
      margin: 0 10px;
      transition: text-shadow 0.3s ease;
      font-family: monospace;
    }
    .footer a:hover {
      text-shadow: 0 0 8px #99cc33;
    }

    /* Mobile fixes */
    @media (max-width: 576px) {
      .footer {
        padding: 0.5rem 0;
        font-size: 0.8rem;
      }
      .btn-outline-light {
        display: block;
        width: 100%;
        margin: 0.5rem 0;
      }
    }

    /* Particles.js background */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -4; /* Lower z-index */
      pointer-events: auto; /* allow mouse to hit the canvas */
    }

    /* CRT Scanlines */
    #crt-scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0px,
        rgba(0,0,0,0.2) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: -2;
      mix-blend-mode: overlay;
    }

    /* VHS HUD Overlay */
    #vhs-overlay {
      position: fixed;
      top: 10px;
      left: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      color: #99cc33;
      opacity: 0.6;
      pointer-events: none;
      text-shadow: 0 0 5px #99cc33;
      z-index: 5;
    }
    #vhs-text {
      animation: vhs-blink 1s steps(2, start) infinite;
    }
    @keyframes vhs-blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.8; }
    }

    /* Example Text */
    #exampleText {
      margin-top: 40px;
      font-size: 1rem;
      font-family: 'Press Start 2P', monospace;
      color: #99cc33;
      min-height: 100px;
      animation: flicker 2s infinite alternate;
    }
    @keyframes flicker {
      0% { opacity: 1; }
      48% { opacity: 0.9; }
      50% { opacity: 0.4; }
      52% { opacity: 0.8; }
      55% { opacity: 0.5; }
      57% { opacity: 0.85; }
      60% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    /* Goji Ghost Watermark */
    #goji-watermark {
      position: fixed;
      bottom: 30px;
      right: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #99cc33;
      opacity: 0.08;
      pointer-events: none;
      text-shadow: 0 0 4px #99cc33;
      animation: watermark-flicker 6s infinite alternate;
      z-index: 5;
    }

    @keyframes watermark-flicker {
      0% { opacity: 0.04; }
      50% { opacity: 0.1; }
      100% { opacity: 0.06; }
    }
    .secret-badge {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      color: #ccff66;
      text-shadow: 0 0 10px #ccff66, 0 0 20px #6633cc;
      background: rgba(0,0,0,0.7);
      padding: 1rem 2rem;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      z-index: 9999;
      font-family: 'Press Start 2P', monospace;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>

<script>
// 🌟 Smooth page load
anime({
  targets: 'body',
  opacity: [0, 1],
  duration: 1500,
  easing: 'easeOutQuad'
});

// 🌟 Title pulsing
anime({
  targets: '.custom-title',
  scale: [
    { value: 1, duration: 1500 },
    { value: 1.05, duration: 1500 }
  ],
  loop: true,
  direction: 'alternate',
  easing: 'easeInOutSine'
});

// 🌟 Example text animate on swap
function animateExampleSwap() {
  anime({
    targets: '#exampleText',
    translateY: [-20, 0],
    opacity: [0, 1],
    duration: 800,
    easing: 'easeOutBounce'
  });
}
swapExample(); // first swap
setInterval(() => {
  swapExample();
  animateExampleSwap();
}, 4000);

// 🌟 Navbar links grow on hover
document.querySelectorAll('.navbar a').forEach(link => {
  link.addEventListener('mouseenter', () => {
    anime({
      targets: link,
      scale: 1.2,
      duration: 300,
      easing: 'easeOutQuad'
    });
  });
  link.addEventListener('mouseleave', () => {
    anime({
      targets: link,
      scale: 1,
      duration: 300,
      easing: 'easeOutQuad'
    });
  });
});

// 🌟 Footer shimmer effect
anime({
  targets: '.footer p, .footer a',
  opacity: [
    { value: 0.8, duration: 2000 },
    { value: 1, duration: 2000 }
  ],
  loop: true,
  direction: 'alternate',
  easing: 'easeInOutSine'
});

// 🌟 Goji Watermark floating
anime({
  targets: '#goji-watermark',
  translateY: [
    { value: -5, duration: 2000 },
    { value: 5, duration: 2000 }
  ],
  loop: true,
  direction: 'alternate',
  easing: 'easeInOutSine'
});

// 🌟 VHS overlay flicker
setInterval(() => {
  anime({
    targets: '#vhs-overlay',
    opacity: [
      { value: 0.5, duration: 100 },
      { value: 0.7, duration: 100 },
      { value: 0.6, duration: 100 }
    ],
    easing: 'easeInOutSine'
  });
}, 3000);
</script>
<script>
// 🌌 Background breathing (page very slightly expands/contracts)
anime({
  targets: 'body',
  scale: [
    { value: 0.995, duration: 5000 },
    { value: 1, duration: 5000 }
  ],
  loop: true,
  direction: 'alternate',
  easing: 'easeInOutSine'
});

// ✨ Particle field pulse
setInterval(() => {
  anime({
    targets: '#particles-js canvas',
    scale: [
      { value: 1.02, duration: 4000 },
      { value: 1, duration: 4000 }
    ],
    easing: 'easeInOutSine'
  });
}, 8000);

// 🪩 Cosmic particle burst on click
document.addEventListener('click', (e) => {
  const burst = document.createElement('div');
  burst.classList.add('burst');
  burst.style.left = `${e.clientX}px`;
  burst.style.top = `${e.clientY}px`;
  document.body.appendChild(burst);

  anime({
    targets: burst,
    scale: [0, 3],
    opacity: [1, 0],
    easing: 'easeOutExpo',
    duration: 1000,
    complete: () => burst.remove()
  });
});

// Inject style for .burst
const style = document.createElement('style');
style.innerHTML = `
  .burst {
    position: fixed;
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, #99cc33 0%, transparent 70%);
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
  }
`;
document.head.appendChild(style);

// 🌟 Navbar links shimmer color (color flash on hover)
document.querySelectorAll('.navbar a').forEach(link => {
  link.addEventListener('mouseenter', () => {
    anime({
      targets: link,
      color: ['#99cc33', '#ccff66'],
      duration: 500,
      direction: 'alternate',
      easing: 'easeInOutSine'
    });
  });
});

// 💡 Custom Title Neon Flicker
function neonFlicker() {
  anime({
    targets: '.custom-title',
    opacity: [
      { value: 1, duration: 100 },
      { value: 0.7, duration: 50 },
      { value: 1, duration: 100 },
      { value: 0.8, duration: 80 },
      { value: 1, duration: 100 }
    ],
    easing: 'easeInOutSine'
  });
}
setInterval(() => {
  if (Math.random() < 0.2) neonFlicker();
}, 2000);

// 🌟 Footer pulsing brightness
anime({
  targets: '.footer',
  filter: [
    { value: 'brightness(100%)', duration: 3000 },
    { value: 'brightness(130%)', duration: 3000 }
  ],
  loop: true,
  direction: 'alternate',
  easing: 'easeInOutSine'
});

// 🎴 Cards bobbing (if you bring back cards)
document.querySelectorAll('.card').forEach(card => {
  anime({
    targets: card,
    translateY: [
      { value: -5, duration: 2000 },
      { value: 0, duration: 2000 }
    ],
    loop: true,
    direction: 'alternate',
    easing: 'easeInOutSine'
  });
});
</script>

// Utility to randomly move an element around the screen
function roamElement(element, speed = 10000) {
  function move() {
    anime({
      targets: element,
      top: `${Math.random() * 90}vh`,
      left: `${Math.random() * 90}vw`,
      easing: 'easeInOutSine',
      duration: speed,
      complete: move // When done moving, move again
    });
  }
  move();
}

// Apply roaming to floating badges

  roamElement(el, 8000 + Math.random() * 4000);
});

// Apply roaming to orbiters

});

// Apply roaming to graffiti tags

});

<script>
document.addEventListener('mousemove', (e) => {
  const mouseX = e.clientX;
  const mouseY = e.clientY;
  document.querySelectorAll('.floating-badge, .orbiter, .graffiti, .hologram').forEach(el => {
    const rect = el.getBoundingClientRect();
    const dx = rect.left + rect.width/2 - mouseX;
    const dy = rect.top + rect.height/2 - mouseY;
    const distance = Math.sqrt(dx*dx + dy*dy);

    if (distance < 200) {
      anime({
        targets: el,
        translateX: `+=${-dx/10}`,
        translateY: `+=${-dy/10}`,
        duration: 300,
        easing: 'easeOutQuad'
      });
    }
  });
});
</script>
