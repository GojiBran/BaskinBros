    <style>
        html, body {
          height: 100%;
          margin: 0;
          background: #111;
          color: #99cc33;
          font-family: 'Press Start 2P', monospace;
          overflow-x: hidden;
        }
        .wrapper {
          display: flex;
          flex-direction: column;
          height: 100%;
        }
        #crt-effect {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 9999; /* on top of everything */
          pointer-events: none; /* doesn't block clicks */
          opacity: 0.25; /* SUPER transparent */

          position: relative;
          z-index: 2;
        }
        .content {
          flex: 1 0 auto;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding: 20px 10px 100px; /* ← ADD bottom padding so content doesn't hide */
        }
        .footer {
          position: fixed;
          bottom: 0;
          left: 0;
          width: 100%;
          background: #111;
          border-top: 2px solid #333;
          padding: 10px 0;
          z-index: 999; /* Keep it above everything */
        }
        h1 {
          font-size: 2.5rem;
        }
        #swarmCounter {
          font-size: 1.25rem;
          font-weight: bold;
        }
        .sparkle {
          position: absolute;
          font-size: 1rem;

          opacity: 0.8;

        }
        @keyframes sparkleMove {
          0% { transform: translate(0, 0) scale(1); opacity: 1; }

        }
        .btn-custom {

          border: none;

        }

        }
        .progress {
          background-color: #222;

          margin-bottom: 8px;
        }
        .globalStats {
          font-size: 1rem;
          margin-top: 10px;
        }
        @media (min-width: 768px) {
          h1 { font-size: 4rem; }
          #swarmCounter { font-size: 2rem; }
          .btn-custom { font-size: 1.5rem; padding: 12px 24px; }
          .progress { height: 24px; }

        .card-title {

        .card-subtitle {
          font-family: 'Press Start 2P', monospace;

          text-shadow: 0 0 3px #99cc33, 0 0 6px #99cc33;
          margin-left: 7px;
        }
        @media (min-width: 768px) {
          .card-title {
            font-size: 1.75rem;
          }
        }
        .neon-card {
          border: 2px solid #99cc33;
          background: rgba(17, 17, 17, 0.95);
          box-shadow: 0 0 10px #99cc33, 0 0 20px #99cc33;
          transition: all 0.3s ease-in-out;
        }
        .neon-card:hover {
          box-shadow: 0 0 15px #ccff66, 0 0 30px #ccff66;
          transform: scale(1.02);
        }
        .neon-dead {
          border: 2px solid #ff6666;
          background: rgba(17, 17, 17, 0.95);
          box-shadow: 0 0 10px #ff6666, 0 0 20px #ff6666;
          transition: all 0.3s ease-in-out;

        .neon-dead:hover {
          box-shadow: 0 0 15px #ff9999, 0 0 30px #ff9999;

        }
        .ready-glow {

          animation: readyPulse 2s infinite alternate;
        }
        @keyframes readyPulse {
          from { box-shadow: 0 0 15px #ccff66, 0 0 30px #ccff66; }
          to { box-shadow: 0 0 25px #ccff66, 0 0 40px #ccff66; }
        }
        .badge {
          font-family: 'Press Start 2P', monospace;
          font-size: 0.7rem;
          white-space: nowrap;
        }
        /* 🌈 Tiny Grax glow colors */
        .tiny-grax {
          display: inline-block;
          font-size: 24px;
          text-shadow: 0 0 4px #99cc33;
          margin: 1px;
        }
    
        .ready-glow-tiny {
          text-shadow: 0 0 6px #66ff66, 0 0 12px #66ff66;
        }
    
        .hunger-glow {
          text-shadow: 0 0 6px #ff3333, 0 0 12px #ff3333;
        }
    
        .boredom-glow {
          text-shadow: 0 0 6px #ffaa33, 0 0 12px #ffaa33;
        }
    
        .dead-glow {
          text-shadow: 0 0 6px #888888, 0 0 12px #555555;
        }
    
        .healthy-glow {
          text-shadow: 0 0 6px #99ccff, 0 0 12px #99ccff;
        }
        @keyframes glitchFlicker {
          0%, 19%, 21%, 59%, 61%, 79%, 81%, 100% {
            opacity: 1;
            filter: none;
          }
          20%, 60%, 80% {
            opacity: 0.85;
            filter: brightness(1.2) contrast(1.2) hue-rotate(10deg);
          }
          40% {
            opacity: 0.9;
            filter: brightness(1.1) contrast(1.1) hue-rotate(-10deg);
          }
        }

        @keyframes glitchIntense {
          0%, 100% {
            opacity: 1;
            filter: none;
            transform: none;
          }
          10%, 30%, 50%, 70%, 90% {
            opacity: 0.7;
            filter: brightness(1.3) contrast(1.4) hue-rotate(15deg) saturate(1.2);
            transform: translateX(-1px) skewX(-1deg);
          }
          20%, 40%, 60%, 80% {
            opacity: 0.8;
            filter: brightness(1.1) contrast(1.2) hue-rotate(-10deg) saturate(0.8);
            transform: translateX(1px) skewX(1deg);
          }
        }

        .glitchy {
          animation: glitchFlicker 2s infinite;
        }

        .glitchy-intense {
          animation: glitchIntense 1.5s infinite;
        }
        /* ---- Particles.js container ---- */
        #particles-js {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: transparent; /* KEEP transparent for CRT effect! */
          z-index: 0; /* Behind everything else */
        }

        /* ---- stats.js counter ---- */
        .count-particles {
          position: fixed;
          top: 48px;
          left: 0;
          width: 90px;
          color: #99cc33;
          font-family: 'Press Start 2P', monospace;
          font-size: 10px;
          background: rgba(0, 0, 34, 0.8);
          padding: 4px;
          border-radius: 0 0 4px 0;
          z-index: 10000;
        }
        .js-count-particles {
          font-size: 12px;
        }
        .cool-text {
          position: relative;
          display: inline-block;
          font-weight: bold;
          background: linear-gradient(90deg, #99cc33, #6633cc, #99cc33, #6633cc, #99cc33);
          background-size: 400% 400%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          color: transparent;
          animation: textShine 6s ease-in-out infinite, pulseGlow 2s ease-in-out infinite alternate, textElectricity 1.5s infinite;
        }

        /* RGB Split Ghosts */
        .cool-text::before,
        .cool-text::after {
          content: attr(data-text);
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          overflow: hidden;
          white-space: nowrap;
          z-index: -1;
        }

        .cool-text::before {
          color: #ff3333;
          transform: translate(1px, 0);
          opacity: 0.5;
        }

        .cool-text::after {
          color: #3399ff;
          transform: translate(-1px, 0);
          opacity: 0.5;
        }

        /* Moving Gradient */
        @keyframes textShine {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        /* Glowing Pulse */
        /* @keyframes pulseGlow {
          0% {
            text-shadow: 0 0 5px #99cc33, 0 0 10px #99cc33, 0 0 15px #ccff66;
          }

          }

            filter: brightness(1.2) contrast(1.2) hue-rotate(-10deg);
          }
        } */
    </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

<script>
    let graxus = JSON.parse(localStorage.getItem('graxusSave')) || [];
    let started = graxus.length > 0;
    let graxCounter = parseInt(localStorage.getItem('graxCounter')) || 1;
    let firstSplitDone = false;
    let playerEnergy = parseInt(localStorage.getItem('playerEnergy')) || 0;
    
    // 🧬 Trait Types
    const traits = [
      { name: "Lazy", growthRate: 0.3, hungerRate: 1, boredomRate: 1 },
      { name: "Energetic", growthRate: 0.7, hungerRate: 1, boredomRate: 2 },
      { name: "Greedy", growthRate: 0.5, hungerRate: 2, boredomRate: 1 },
      { name: "Chill", growthRate: 0.5, hungerRate: 0.5, boredomRate: 0.5 },
      { name: "Hyper", growthRate: 0.8, hungerRate: 1.5, boredomRate: 2 },
      { name: "Balanced", growthRate: 0.5, hungerRate: 1, boredomRate: 1 }
    ];
    
    // 🎵 Sound Setup
    const popSounds = {
      "380": new Howl({ src: ['sounds/pop-380.mp3'], volume: 0.5 }),
      "420": new Howl({ src: ['sounds/pop-420.mp3'], volume: 0.5 }),
      "440": new Howl({ src: ['sounds/pop-440.mp3'], volume: 0.5 }),
      "600": new Howl({ src: ['sounds/pop-600.mp3'], volume: 0.5 }),
      "660": new Howl({ src: ['sounds/pop-660.mp3'], volume: 0.5 }),
      "880": new Howl({ src: ['sounds/pop-880.mp3'], volume: 0.1 }),
    };

    // ✨ Track currently playing sounds manually
    const popCurrentlyPlaying = {};

    // 🎵 Enhanced Play Pop
    function playPop(frequency = 440) {
      const freqStr = frequency.toString();
      const sound = popSounds[freqStr];

      if (sound) {
        if (!popCurrentlyPlaying[freqStr]) { // Only if not already playing
          const id = sound.play();
          popCurrentlyPlaying[freqStr] = true;

          // Listen for when the sound finishes
          sound.once('end', () => {
            popCurrentlyPlaying[freqStr] = false;
          });
        }
      } else {
        console.log(`Pop sound for ${frequency}Hz not found.`);
      }
    }
    
    // 🥚 Hatch Initial Egg
    function startGraxus() {
      if (started) return alert('Starter egg already hatched!');
      started = true;
      hatchEgg();
      playerEnergy = 0; // Start fresh
      savePlayerEnergy();
      updateEnergyDisplay();

      const startBtn = document.getElementById('startBtn');
      if (startBtn) {
        startBtn.style.transition = 'opacity 0.5s ease'; 
        startBtn.style.opacity = '0'; // 🛑 Start fading

        setTimeout(() => {
          startBtn.style.display = 'none';
          localStorage.setItem('startBtnHidden', 'true'); // ✨ Save hidden state
        }, 500);
      }

      const feedBtn = document.getElementById('feedBtn');
      const playBtn = document.getElementById('playBtn');
      if (feedBtn) feedBtn.disabled = false;
      if (playBtn) playBtn.disabled = false;

      attachButtonListeners(); // 🛠 Always reattach
    }
    
    function hatchEgg(applyAdultPenalty = false, silent = false) {
      const id = "grax_" + Date.now();
      const name = "Grax-" + String(graxCounter).padStart(3, "0");
      graxCounter++;
      graxus.push({
        id, name, hunger: 0, boredom: 0, growth: 0,
        stage: "egg", 
        alive: true, 
        createdAt: Date.now(),
        trait: randomTrait(), 
        readyToMultiply: false,
        babiesMade: 0,
        pendingStageUp: false
      });
      updateParticleCount();
    
      if (applyAdultPenalty) {
        const adults = graxus.filter(g => g.alive && g.stage === "adult");
        for (const a of adults) {
          a.growth = Math.floor(a.growth * 0.5);
        }
        updateAdultStageGrowth();
      }
    
      renderGraxus();
    
      if (!silent) {
        anime({
          targets: '#stageDisplay .card',
          opacity: [0, 1],
          scale: [0.8, 1],
          easing: 'easeOutExpo',
          duration: 800,
          delay: anime.stagger(100)
        });
      }
    }
    
    function randomTrait() {
      return traits[Math.floor(Math.random() * traits.length)];
    }
    
    function updateAdultStageGrowth() {
      const adults = graxus.filter(g => g.alive && g.stage === "adult");
      if (adults.length > 0) {
        const totalGrowth = adults.reduce((sum, g) => sum + g.growth, 0);
        const averageGrowth = totalGrowth / adults.length;
        for (const g of adults) {
          g.growth = averageGrowth;
        }
      }
    }
    
    // 🥕 Feeding and Playing
    function feedAll() {
      if (playerEnergy < 10) return;
      playerEnergy -= 10;
      savePlayerEnergy();

      for (const g of graxus) {
        if (g.alive) {
          g.hunger = Math.max(0, g.hunger - 20);

          let feedBoost = getFeedGrowthBoost(g.stage);
          feedBoost += (Math.random() * 2) - 1; // ±1 randomness
          g.growth = Math.min(100, g.growth + Math.max(0, feedBoost));

          if (g.growth >= 100) {
            g.pendingStageUp = true;
            if (g.stage === "adult" && g.babiesMade === 0) {
              g.readyToMultiply = true;
            }
          }
        }
      }

      renderGraxus(); // ✅ Only once after finishing
    }
    
    function playAll() {
      if (playerEnergy < 10) return;
      playerEnergy -= 10;
      savePlayerEnergy();

      for (const g of graxus) {
        if (g.alive) {
          g.boredom = Math.max(0, g.boredom - 20);

          let playBoost = getPlayGrowthBoost(g.stage);
          playBoost += (Math.random() * 2) - 1; // ±1 randomness
          g.growth = Math.min(100, g.growth + Math.max(0, playBoost));

          if (g.growth >= 100) {
            g.pendingStageUp = true;
            if (g.stage === "adult" && g.babiesMade === 0) {
              g.readyToMultiply = true;
            }
          }
        }
      }

      renderGraxus(); // ✅ Only once after finishing
    }
    
    // 🌿 Growth Boosts
    function getFeedGrowthBoost(stage) {
      if (stage === "egg") return 2;
      if (stage === "baby") return 6;
      if (stage === "adult") return 10;
      return 5;
    }
    
    function getPlayGrowthBoost(stage) {
      if (stage === "egg") return 1;
      if (stage === "baby") return 4;
      if (stage === "adult") return 7;
      return 3;
    }
    
    // ⏳ Ticking Updates
    function tick() {
      if (!started) return; // 🛑 Only tick if game has started!

      resetTickBar();
      startTickBar();

      const livingAdults = graxus.filter(g => g.alive && g.stage === "adult").length;
      playerEnergy += 100 + (livingAdults * 10);
      savePlayerEnergy();
      updateEnergyDisplay();
    
      for (const g of graxus) {
        if (!g.alive) continue;
        const t = g.trait;
        g.hunger = Math.min(100, g.hunger + (t.hungerRate || 1));
        g.boredom = Math.min(100, g.boredom + (t.boredomRate || 1));
        
        // 🛠 Randomize individual growth gain slightly
        const growthVariance = (Math.random() * 0.5) - 0.25; // -0.25 to +0.25
        const growthAmount = Math.max(0, (t.growthRate || 0.5) + growthVariance);
        g.growth = Math.min(100, g.growth + growthAmount);
    
        if (g.hunger >= 100 || g.boredom >= 100) {
          g.alive = false;
        }
      }
    
      // 🧬 Group stage evolution
      for (const g of graxus) {
        if (!g.alive) continue;
        if (g.growth >= 100) {
          if (g.stage === "egg") {
            g.stage = "baby";
            g.hunger = 0;
            g.boredom = 0;
            g.growth = 0;
            playPop(380); // 🎵 Play evolution sound (egg -> baby)
          } else if (g.stage === "baby") {
            g.stage = "adult";
            g.hunger = 0;
            g.boredom = 0;
            g.growth = 0;
            updateAdultStageGrowth();
            playPop(420); // 🎵 Play evolution sound (baby -> adult)
          } else if (g.stage === "adult") {
            if (!g.readyToMultiply && g.babiesMade < 2) {
              g.readyToMultiply = true;
              playPop(440); // 🎵 Only play sound once, when they first become ready
            }
            // If already readyToMultiply or can't multiply anymore, do nothing
          }
        }
      }
    
      // 🌟 Solo first split
      if (!firstSplitDone) {
        const readyAdults = graxus.filter(g => g.alive && g.stage === "adult" && g.readyToMultiply);
        if (readyAdults.length === 1) {
          hatchEgg(false, true); // 👈 hatch silently during solo split
          const soloGrax = readyAdults[0];
          soloGrax.growth = 0;
          soloGrax.readyToMultiply = false; // ✅ Only reset readyToMultiply
          // ❌ Do NOT set babiesMade = 2
          firstSplitDone = true;
        }
      }
    
      // 🐙 Normal multiplication
      const readyAdults = graxus.filter(g => g.alive && g.stage === "adult" && g.readyToMultiply);
      for (let i = 0; i < readyAdults.length; i++) {
        for (let j = i + 1; j < readyAdults.length; j++) {
          const a = readyAdults[i];
          const b = readyAdults[j];
    
          // Only allow Grax that have never mated
          if (a.babiesMade > 0 || b.babiesMade > 0) continue;
    
          // 🎲 Random 2–5 babies per mating
          const babiesToMake = Math.floor(Math.random() * 4) + 2; // 2, 3, 4, or 5
    
          for (let k = 0; k < babiesToMake; k++) {
            hatchEgg(true);
          }
    
          // After mating, they cannot mate again
          a.readyToMultiply = false;
          b.readyToMultiply = false;
          a.babiesMade = 1;
          b.babiesMade = 1;

          renderGraxus(); // 🐙 ✨ IMMEDIATELY re-render to reflect correct ready status

          return; // 🛑 Important: only allow one pair to mate per tick
        }
      }
    
      localStorage.setItem('graxusSave', JSON.stringify(graxus));
      localStorage.setItem('graxCounter', graxCounter);
      renderGraxus();
    }
    
    // 🌟 Main Render Function
    function renderGraxus() {
      const loadingOverlay = document.getElementById('loadingOverlay');

    // ✨ Glitch effect based on % ready
    function glitchCanvasSprite(canvas, readyCount = 1, aliveCount = 1) {
      const ctx = canvas.getContext('2d');

      const readyRatio = aliveCount > 0 ? readyCount / aliveCount : 0;
      const maxGlitchStrength = 10;
      const glitchStrength = Math.max(1, Math.floor(readyRatio * maxGlitchStrength));

      setInterval(() => {
        const imageData = ctx.getImageData(0, 0, 16, 16);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4 * Math.floor(1 + Math.random() * glitchStrength)) {
          data[i] = data[i + (Math.random() > 0.5 ? 4 : -4)] || data[i];
          data[i + 1] = data[i + 1 + (Math.random() > 0.5 ? 4 : -4)] || data[i + 1];
          data[i + 2] = data[i + 2 + (Math.random() > 0.5 ? 4 : -4)] || data[i + 2];
        }

        ctx.putImageData(imageData, 0, 0);
      }, 100); // Every 100ms
    }

    function simulateLoading() {
      const loadingBar = document.getElementById('loadingBar');
      const loadingOverlay = document.getElementById('loadingOverlay');
      if (!loadingBar || !loadingOverlay) return;

      // ✅ Set a clean initial placeholder safely
      setGlobalStats(0, 0, playerEnergy);

      let loadingProgress = 0;
      const interval = setInterval(() => {
        loadingProgress += Math.random() * 10; // Simulate random progress

        if (loadingProgress >= 100) {
          loadingProgress = 100;
          clearInterval(interval);

          setTimeout(() => {
            loadingOverlay.style.opacity = 0;
            setTimeout(() => {
              loadingOverlay.remove();

              // ✨ Hide Start Button if needed
              const startBtn = document.getElementById('startBtn');
              if (startBtn && localStorage.getItem('startBtnHidden') === 'true') {
                startBtn.style.display = 'none';
              }

              if (started) {
                renderGraxus();
                attachButtonListeners();
                startTickBar();
                tick();
              } else {
                attachButtonListeners();
              }
            }, 500);
          }, 300);
        }

        anime({

          duration: 200,
          easing: 'linear'
        });
      }, 200);
    }

    // 🛠 Attach Control Buttons
    function attachButtonListeners() {
      const startBtn = document.getElementById('startBtn');
      const feedBtn = document.getElementById('feedBtn');
      const playBtn = document.getElementById('playBtn');
      const resetBtn = document.getElementById('resetBtn');

      if (startBtn && !startBtn.hasListener) {
        startBtn.addEventListener('click', () => {
          startGraxus();
          if (feedBtn) feedBtn.disabled = false;
          if (playBtn) playBtn.disabled = false;
        });
        startBtn.hasListener = true;
      }
      if (feedBtn && !feedBtn.hasListener) {
        feedBtn.addEventListener('click', feedAll);
        feedBtn.hasListener = true;
      }
      if (playBtn && !playBtn.hasListener) {
        playBtn.addEventListener('click', playAll);
        playBtn.hasListener = true;
      }
      if (resetBtn && !resetBtn.hasListener) {
        resetBtn.addEventListener('click', clearSave);
        resetBtn.hasListener = true;
      }

      // ✨ Disable Feed and Play initially if not started
      if (!started) {
        if (feedBtn) feedBtn.disabled = true;
        if (playBtn) playBtn.disabled = true;
      }
    }
    
    // 🕒 Tick Bar Visual
    let tickBarInterval;
    const TICK_DURATION = 5000; // 5 seconds

    function startTickBar() {
      const bar = document.getElementById('tickProgressBar');
      if (!bar) return;

      // Instantly reset the bar
      bar.style.transition = 'none';
      bar.style.width = '0%';

      // Force reflow (this makes the browser "notice" the reset)
      void bar.offsetWidth; 

      // Now animate smoothly over the tick duration
      bar.style.transition = `width ${TICK_DURATION}ms linear`;
      bar.style.width = '100%';
    }

    function resetTickBar() {
      const bar = document.getElementById('tickProgressBar');
      if (bar) {
        bar.style.transition = 'none';
        bar.style.width = '0%';
      }
    }

    // 🛠 Setup Tick Intervals
    setInterval(tick, 5000); // Update every 5 seconds
    setInterval(() => {
      for (const g of graxus) {
        if (g.alive) {
          g.hunger = Math.max(0, g.hunger - 5);
          g.boredom = Math.max(0, g.boredom - 5);
          g.growth = Math.min(100, g.growth + 3);
        }
      }
      renderGraxus(); // ✅ Just re-render, NO touching the tick bar
      //startTickBar(); // ✨ Optional: Refresh the tick bar after healing
    }, 30000); // Recovery and growth boost every 30 seconds

<script>
// 🌟 Animate number counting (anime.js)
function animateNumber(target, finalValue, duration = 800) {
  const type = target.dataset.type || "none";
  const initialText = target.innerText;
  let initialValue = 0;

  if (type === "energy") {
    initialValue = parseInt(initialText.replace(/[^\d]/g, '')) || 0;
  } else {
    // Extract the number, but preserve emojis separately
    const match = initialText.match(/(\d+)/);
    if (match) {
      initialValue = parseInt(match[1]);
    }
  }

  const obj = { value: initialValue };

  anime({
    targets: obj,
    value: finalValue,
    duration: duration,
    easing: 'easeOutExpo',
    round: 1,
    update: function() {
      if (type === "energy") {
        target.innerText = `⚡ ${obj.value}`;
      } else if (type === "alive") {
        target.innerText = `🧬 ${obj.value}`;
      } else if (type === "dead") {
        target.innerText = `✨ ${obj.value}`;
      } else {
        target.innerText = obj.value;
      }
    }
  });
}
</script>

function updateParticleCount() {
  if (window.pJSDom && window.pJSDom[0] && window.pJSDom[0].pJS) {
    const pJS = window.pJSDom[0].pJS;
    const aliveGraxCount = graxus.filter(g => g.alive).length;

    const difference = aliveGraxCount - pJS.particles.array.length;

    if (difference > 0) {
      // Add new particles
      for (let i = 0; i < difference; i++) {
        pJS.particles.array.push(pJS.fn.modes.pushParticles(1));
      }
    } else if (difference < 0) {
      // Remove extra particles
      pJS.particles.array.splice(difference);
    }
  }
}

function animateParticles() {
  requestAnimationFrame(animateParticles);
}
animateParticles();

    // 🌈 Create CRT Shader Material (static, with RGB offset)
    const crtShaderMaterial = new THREE.ShaderMaterial({
      uniforms: {

      },
      vertexShader: `
        varying vec2 vUv;

          vUv = uv;
          gl_Position = vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform vec2 resolution;
    
        void main() {
          vec2 uv = vUv;
    
          // 📶 Static scanlines
          float scanline = sin(uv.y * resolution.y * 1.5);
    
          // 🎨 Static RGB slight offset (manual shifts)
          float rCol = smoothstep(0.0, 1.0, uv.x + 0.0015);
          float gCol = smoothstep(0.0, 1.0, uv.x);
          float bCol = smoothstep(0.0, 1.0, uv.x - 0.0015);
    
          vec3 color = vec3(rCol, gCol, bCol);
    
          // 📺 Apply static scanlines
          color *= (0.5 + 0.5 * scanline);
    
          // 💡 Dim softly to overlay nicely
          color *= 0.3;
    
          gl_FragColor = vec4(color, 1.0);
        }
      `,
      transparent: true
    });
    
    const quadGeometry = new THREE.PlaneGeometry(2, 2);
    const quad = new THREE.Mesh(quadGeometry, crtShaderMaterial);
    scene.add(quad);
    
    // 🔥 Animate the CRT
    function animateCRT() {
      requestAnimationFrame(animateCRT);
      renderer.render(scene, camera); // Only rendering, no animation of uniforms
    }
    
    animateCRT();
    
    // 📏 Handle window resize
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      crtShaderMaterial.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
    });

// 🌟 Handle Main Menu
function showMainMenu() {
  const mainMenu = document.getElementById('mainMenu');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const graxusWrapper = document.getElementById('graxus-wrapper');

  mainMenu.style.display = 'flex';
  if (loadingOverlay) loadingOverlay.style.display = 'none';
  if (graxusWrapper) graxusWrapper.style.display = 'none';

  const hasSave = localStorage.getItem('graxusSave');
  const continueBtn = document.getElementById('menuContinueBtn');
  if (hasSave && continueBtn) {
    continueBtn.style.display = 'inline-block';
  }

  document.getElementById('menuStartBtn').onclick = () => {
    localStorage.clear(); // Start fresh
    startLoading();
  };

  if (continueBtn) {
    continueBtn.onclick = () => {
      startLoading();
    };
  }
}

// ✨ Initialize Animations for Graxus UI
function initAnimations() {
  // 🌟 Animate Title
  anime({
    targets: '.glitchy',
    scale: [
      { value: 1, duration: 500 },
      { value: 1.05, duration: 1000 },
      { value: 1, duration: 500 }
    ],
    easing: 'easeInOutSine',
    loop: true,
    delay: anime.stagger(200)
  });

  // 🌟 Animate Main Menu Buttons
  anime({
    targets: '.glitchy-intense',
    translateY: [
      { value: -5, duration: 1000 },
      { value: 0, duration: 1000 }
    ],
    easing: 'easeInOutSine',
    loop: true,
    delay: anime.stagger(300)
  });

  // 🌟 Animate Stage Cards
  anime({
    targets: '#stageDisplay .card',
    opacity: [0, 1],
    scale: [0.8, 1],
    easing: 'easeOutExpo',
    duration: 800,
    delay: anime.stagger(100)
  });

  // 🌟 Animate Tiny Grax Wiggle
  anime({
    targets: '#tinyGraxDisplay .tiny-grax',
    translateY: [
      { value: -2, duration: 1000 },
      { value: 2, duration: 1000 }
    ],
    easing: 'easeInOutSine',
    loop: true,
    delay: anime.stagger(50)
  });

  // 🌟 Animate Sparkles
  anime({
    targets: '.sparkle',
    translateX: function() { return anime.random(-20, 20); },
    translateY: function() { return anime.random(-40, -80); },
    opacity: [1, 0],
    duration: function() { return 2000 + anime.random(0, 1000); },
    easing: 'easeOutQuad',
    loop: true
  });
}

function startLoading() {
  const mainMenu = document.getElementById('mainMenu');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const graxusWrapper = document.getElementById('graxus-wrapper');

  if (mainMenu) mainMenu.style.display = 'none';
  if (loadingOverlay) loadingOverlay.style.display = 'flex';
  if (graxusWrapper) graxusWrapper.style.display = 'block';

  simulateLoading();
  initAnimations(); // ✨ Animate everything!
  
  particlesJS("particles-js", {   // <<< ADD THIS RIGHT HERE
    "particles": {
      "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
      "color": { "value": "#99cc33" },
      "shape": { "type": "circle", "stroke": { "width": 0, "color": "#000000" } },
      "opacity": { "value": 0.5, "random": false },
      "size": { "value": 3, "random": true },
      "line_linked": { "enable": true, "distance": 150, "color": "#6633cc", "opacity": 0.4, "width": 1 },
      "move": { "enable": true, "speed": 6, "direction": "none", "out_mode": "out", "bounce": false }
    },
    "interactivity": {
      "events": {
        "onhover": { "enable": true, "mode": "repulse" },
        "onclick": { "enable": false },
        "resize": true
      },
      "modes": {
        "repulse": { "distance": 200, "duration": 0.4 }
      }
    },
    "retina_detect": true
  });
}

// 👾 Start on main menu instead of loading immediately
window.onload = showMainMenu;

</script>
